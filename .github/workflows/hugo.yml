name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BASE_URL: "https://betterforboothby.com.au"
        run: |
          # Find content files changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- content/ | grep '\.md$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No content files changed — skipping IndexNow submission."
            exit 0
          fi

          # Convert content paths to site URLs
          URLS=()
          while IFS= read -r file; do
            # content/_index.md  -> /
            # content/blog/_index.md -> /blog/
            # content/blog/foo.md -> /blog/foo/
            url=$(echo "$file" \
              | sed 's|^content/||' \
              | sed 's|_index\.md$||' \
              | sed 's|\.md$|/|')
            URLS+=("\"${BASE_URL}/${url}\"")
          done <<< "$CHANGED"

          URL_LIST=$(IFS=,; echo "${URLS[*]}")
          PAYLOAD=$(printf '{"host":"betterforboothby.com.au","key":"%s","keyLocation":"%s/%s.txt","urlList":[%s]}' \
            "$INDEXNOW_KEY" "$BASE_URL" "$INDEXNOW_KEY" "$URL_LIST")

          echo "Submitting to IndexNow:"
          echo "$URL_LIST" | tr ',' '\n'

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "IndexNow API response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "IndexNow submission successful."
          else
            echo "IndexNow submission returned HTTP $HTTP_STATUS — check API docs."
            exit 1
          fi
